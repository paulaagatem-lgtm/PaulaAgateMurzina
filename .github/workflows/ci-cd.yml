name: Students file CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  check-students-file:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if Students.md exists
        run: |
          if [ ! -f Students.md ]; then
            echo "Error: Students.md file not found"
            exit 1
          fi

      - name: Show Students.md content
        run: cat Students.md

      - name: Test step
        run: echo "Check completed successfully"

      - name: Deploy demo
        if: success()
        run: echo "Deploy successful"
